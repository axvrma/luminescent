[build]
  command = "npm run build-storybook"
  publish = "storybook-static"

# Optional: Set cache control headers for performance
[[headers]]
  for = "/*"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
